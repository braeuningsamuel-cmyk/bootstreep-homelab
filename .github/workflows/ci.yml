name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./bootstrap

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run yamllint
        run: |
          pip install yamllint
          yamllint bootstrap/

  shellcheck-strict:
    name: Bash Strict Mode Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify bash strict mode
        run: |
          grep -lE '^set -[Euo]+' bootstrap/scripts/*.sh || (echo "Missing strict mode"; exit 1)
          echo "All scripts use strict mode ✓"