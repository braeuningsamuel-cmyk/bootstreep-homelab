# Bootstreep Homelab – Alle Dienste (Merged) v3.5.0
# Usage: docker compose -f docker-compose-all.yml up -d
#
# Hinweis: Einige Dienste benötigen zusätzliche Konfiguration:
# - Ollama: volumes Pfad anpassen
# - Nextcloud: /opt/nextcloud-data muss existieren
# - Websurfx: muss vorher gebaut werden (docker build)
# - Hermes: muss vorher geklont sein

x-common: &common
  restart: unless-stopped
  networks:
    - homelab

services:
  # ─── DNS ────────────────────────────────────────────────
  unbound:
    <<: *common
    image: mvance/unbound:latest
    container_name: unbound
    ports:
      - "127.0.0.1:5335:53/udp"
      - "127.0.0.1:5335:53/tcp"
    volumes:
      - ./config/dns/unbound.conf:/opt/unbound/unbound.conf:ro

  pihole:
    <<: *common
    image: pihole/pihole:latest
    container_name: pihole
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8081:80/tcp"
    environment:
      TZ: ${TIMEZONE:-Europe/Berlin}
      WEBPASSWORD: "${PIHOLE_PASS:-admin}"
      PIHOLE_DNS_: "127.0.0.1#5335"
      DNSSEC: "true"
    volumes:
      - pihole_etc:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    healthcheck:
      test: ["CMD", "sh", "-c", "dig +short google.com @127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    cap_add:
      - NET_ADMIN
    depends_on:
      - unbound

  # ─── KI-WORKFLOWS ────────────────────────────────────────
  n8n:
    <<: *common
    image: n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_HOST=localhost

  # ─── KI-CHAT-UI ──────────────────────────────────────────
  open-webui:
    <<: *common
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3002:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - ollama

  hermes:
    <<: *common
    image: node:20-alpine
    container_name: hermes
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ~/hermes:/app
    command: sh -c "npm install && npm run build && npm start"
    depends_on:
      - ollama

  # ─── PRIVATSPHÄRE ────────────────────────────────────────
  tor:
    <<: *common
    image: peterdavehello/tor-socks-proxy:latest
    container_name: tor
    ports:
      - "127.0.0.1:9050:9150"

  websurfx:
    <<: *common
    image: websurfx:local
    container_name: websurfx
    ports:
      - "8080:8080"
    depends_on:
      - tor

  # ─── KI ──────────────────────────────────────────────────
  ollama:
    <<: *common
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 14g

  # ─── DOWNLOAD-CLIENT ─────────────────────────────────────
  sabnzbd:
    <<: *common
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    ports:
      - "8085:8080"
    volumes:
      - sabnzbd_config:/config
      - ~/downloads:/downloads
      - ~/media:/media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-Europe/Berlin}

  # ─── MEDIEN ──────────────────────────────────────────────
  jellyfin:
    <<: *common
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    ports:
      - "8096:8096"
    volumes:
      - jellyfin_config:/config
      - ~/media:/media:ro
    devices:
      - "/dev/dri:/dev/dri"

  sonarr:
    <<: *common
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    ports:
      - "8989:8989"
    volumes:
      - sonarr_config:/config
      - ~/media/series:/tv
      - ~/downloads:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-Europe/Berlin}

  radarr:
    <<: *common
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    ports:
      - "7878:7878"
    volumes:
      - radarr_config:/config
      - ~/media/movies:/movies
      - ~/downloads:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-Europe/Berlin}

  prowlarr:
    <<: *common
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    ports:
      - "9696:9696"
    volumes:
      - prowlarr_config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-Europe/Berlin}

  bazarr:
    <<: *common
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    ports:
      - "6767:6767"
    volumes:
      - bazarr_config:/config
      - ~/media/movies:/movies
      - ~/media/series:/tv
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-Europe/Berlin}

  # ─── CLOUD & SYNC ────────────────────────────────────────
  nextcloud-aio:
    <<: *common
    image: nextcloud/all-in-one:latest
    container_name: nextcloud-aio
    ports:
      - "8082:8080"
      - "9443:8443"
    volumes:
      - /opt/nextcloud-data:/var/lib/docker/volumes/nextcloud-aio
      - /var/run/docker.sock:/var/run/docker.sock:ro

  syncthing:
    <<: *common
    image: syncthing/syncthing:latest
    container_name: syncthing
    ports:
      - "8384:8384"
      - "22000:22000"
      - "21027:21027/udp"
    volumes:
      - syncthing_data:/var/syncthing
      - ~/vault:/var/syncthing/vault
    environment:
      - STGUIADDRESS=0.0.0.0:8384

  # ─── MONITORING ──────────────────────────────────────────
  uptime-kuma:
    <<: *common
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data

  # ─── DASHBOARD ────────────────────────────────────────────
  heimdall:
    <<: *common
    image: lscr.io/linuxserver/heimdall:latest
    container_name: heimdall
    ports:
      - "8090:80"
      - "8091:443"
    volumes:
      - heimdall_config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-Europe/Berlin}

  # ─── GAMESERVER ───────────────────────────────────────────
  teamspeak:
    <<: *common
    image: teamspeak:latest
    container_name: teamspeak
    ports:
      - "9987:9987/udp"
      - "10011:10011"
      - "30033:30033"
    volumes:
      - teamspeak_data:/var/ts3server
    environment:
      - TS3SERVER_LICENSE=accept

  amp:
    <<: *common
    image: ghcr.io/cubecoders/amp:latest
    container_name: amp
    ports:
      - "8087:8080"
      - "8088:8088"
    volumes:
      - amp_data:/amp
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - AMP_UID=1000
      - AMP_GID=1000

  # ─── REVERSE PROXY ───────────────────────────────────────
  caddy:
    <<: *common
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pihole_etc:
  pihole_dnsmasq:
  ollama_data:
  jellyfin_config:
  sabnzbd_config:
  sonarr_config:
  radarr_config:
  prowlarr_config:
  bazarr_config:
  n8n_data:
  open_webui_data:
  syncthing_data:
  uptime_kuma_data:
  heimdall_config:
  teamspeak_data:
  amp_data:
  caddy_data:
  caddy_config:

networks:
  homelab:
    external: true
