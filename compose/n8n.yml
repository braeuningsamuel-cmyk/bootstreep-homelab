---
# n8n – Workflow-Automation

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  networks: [backend]

services:
  n8n:
    <<: *common
    image: n8nio/n8n:1.126.7
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits: {memory: 1g}

volumes:
  n8n_data:

networks:
  backend:
    external: true
