---
# Sonarr – Serien-Management

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  networks: [backend]

services:
  sonarr:
    <<: *common
    image: lscr.io/linuxserver/sonarr:4.0.9
    container_name: sonarr
    ports:
      - "8989:8989"
    volumes:
      - sonarr_config:/config
      - ~/media/series:/tv
      - ~/downloads:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-Europe/Berlin}
    deploy:
      resources:
        limits: {memory: 512m, cpus: "1"}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/api/v3/system/status"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  sonarr_config:

networks:
  backend:
    external: true
