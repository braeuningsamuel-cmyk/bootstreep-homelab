services:
  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "8384:8384"
      - "22000:22000"
      - "21027:21027/udp"
    volumes:
      - syncthing_data:/var/syncthing
      - ~/vault:/var/syncthing/vault
    environment:
      - STGUIADDRESS=0.0.0.0:8384
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8384/rest/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - homelab

volumes:
  syncthing_data:

networks:
  homelab:
    external: true

