---
# Syncthing – P2P File-Sync (Privacy: keine Cloud, direkt Gerät-zu-Gerät)

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  networks: [backend]

services:
  syncthing:
    <<: *common
    image: syncthing/syncthing:1.27.7
    container_name: syncthing
    ports:
      - "8384:8384"
      - "22000:22000/tcp"
      - "21027:21027/udp"
    volumes:
      - syncthing_data:/var/syncthing
      - ~/vault:/var/syncthing/vault
    environment:
      - STGUIADDRESS=0.0.0.0:8384
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8384/rest/system/status"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  syncthing_data:

networks:
  backend:
    external: true
