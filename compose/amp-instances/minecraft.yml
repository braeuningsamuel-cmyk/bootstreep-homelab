---
# Minecraft-Server (standalone, ohne AMP)

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  networks: [backend]

services:
  minecraft:
    <<: *common
    image: itzg/minecraft-server:2024.07.0
    container_name: minecraft
    ports:
      - "25565:25565"
      - "25575:25575"
    environment:
      - EULA=TRUE
      - TYPE=PAPER
      - MEMORY=4G
      - DIFFICULTY=normal
      - MODE=survival
      - OPS=admin
      - SERVER_NAME=Bootstreep-MC
      - MAX_PLAYERS=20
      - RCON_PASSWORD=${RCON_PASSWORD:-changeme}
      - RCON_PORT=25575
    volumes:
      - minecraft_data:/data
    healthcheck:
      test: ["CMD", "mc-health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

volumes:
  minecraft_data:

networks:
  backend:
    external: true
