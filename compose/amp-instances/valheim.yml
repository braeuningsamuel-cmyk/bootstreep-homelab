---
# Valheim-Server (standalone)

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  networks: [backend]

services:
  valheim:
    <<: *common
    image: lscr.io/linuxserver/valheim:latest
    container_name: valheim
    ports:
      - "2456:2456/udp"
      - "2457:2457/udp"
      - "2458:2458/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-Europe/Berlin}
      - SERVER_NAME="Bootstreep Valheim"
      - WORLD_NAME=dedicated
      - SERVER_PASS=${SERVER_PASS:-changeme}
      - SERVER_PUBLIC=true
      - UPDATE_MODS_ON_START=true
    volumes:
      - valheim_config:/config
      - valheim_data:/data
    deploy:
      resources:
        limits: {memory: 2g, cpus: "2"}
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

volumes:
  valheim_config:
  valheim_data:

networks:
  backend:
    external: true
