services:
  websurfx:
    image: websurfx:local
    container_name: websurfx
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      tor:
        condition: service_healthy
    networks:
      - homelab

networks:
  homelab:
    external: true
