services:
  amp:
    image: ghcr.io/cubecoders/amp:latest
    container_name: amp
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # cap_drop: ALL nicht möglich - AMP benötigt Docker Socket für Game-Server Management
    ports:
      - "8087:8080"
      - "8088:8088"
    volumes:
      - amp_data:/amp
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - AMP_UID=1000
      - AMP_GID=1000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - homelab

volumes:
  amp_data:

networks:
  homelab:
    external: true
