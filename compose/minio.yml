---
# MinIO – S3-kompatibler Object Storage (Backup, KI-Daten)
# Bootstreep Homelab v4.0

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  networks: [backend]

services:
  minio:
    <<: *common
    image: minio/minio:RELEASE.2024-10-02T22-04-27Z
    container_name: minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?}
      - MINIO_DOMAIN=minio
      - MINIO_BROWSER=on
    command: server /data --console-address ":9001"
    deploy:
      resources:
        limits: {memory: 2g, cpus: "2"}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 60s
      timeout: 5s
      retries: 3

volumes:
  minio_data:

networks:
  backend:
    external: true
