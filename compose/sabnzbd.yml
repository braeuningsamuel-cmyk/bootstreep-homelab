---
# SABnzbd – Download-Client

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  networks: [homelab]

services:
  sabnzbd:
    <<: *common
    image: lscr.io/linuxserver/sabnzbd:4.3.2
    container_name: sabnzbd
    ports:
      - "8085:8080"
    volumes:
      - sabnzbd_config:/config
      - ~/downloads:/downloads
      - ~/media:/media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-Europe/Berlin}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  sabnzbd_config:

networks:
  homelab:
    external: true
