services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "8096:8096"
    volumes:
      - jellyfin_config:/config
      - ~/media:/media:ro
    devices:
      - "/dev/dri:/dev/dri"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4g
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - homelab

volumes:
  jellyfin_config:

networks:
  homelab:
    external: true
