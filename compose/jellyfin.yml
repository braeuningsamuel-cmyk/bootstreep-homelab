---
# Jellyfin – Media-Streaming

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  networks: [backend]

services:
  jellyfin:
    <<: *common
    image: jellyfin/jellyfin:10.9.7
    container_name: jellyfin
    ports:
      - "8096:8096"
    volumes:
      - jellyfin_config:/config
      - ~/media:/media:ro
    devices:
      - "/dev/dri:/dev/dri"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits: {memory: 4g, cpus: "4"}
    logging:
      driver: json-file
      options: {max-size: "20m", max-file: "3"}

volumes:
  jellyfin_config:

networks:
  backend:
    external: true
