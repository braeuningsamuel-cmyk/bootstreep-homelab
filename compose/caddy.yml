---
# Caddy – Reverse Proxy mit Auto-HTTPS

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  cap_add: [NET_BIND_SERVICE]
  networks: [frontend, backend]

services:
  caddy:
    <<: *common
    image: caddy:2.8-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits: {memory: 256m}

volumes:
  caddy_data:
  caddy_config:

networks:
  frontend:
    external: true
  backend:
    external: true
