---
# Ollama – Lokale KI (Privacy: keine Cloud, nur 127.0.0.1)

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  networks: [homelab]

services:
  ollama:
    <<: *common
    image: ollama/ollama:0.3.12
    container_name: ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=127.0.0.1
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
    deploy:
      resources:
        limits: {memory: 14g, cpus: "8"}
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 60s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options: {max-size: "50m", max-file: "3"}

volumes:
  ollama_data:

networks:
  homelab:
    external: true
