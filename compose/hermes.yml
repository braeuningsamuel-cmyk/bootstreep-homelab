services:
  hermes:
    image: node:20-alpine
    container_name: hermes
    restart: unless-stopped
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ~/hermes:/app
    command: sh -c "npm install && npm run build && npm start"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - homelab

networks:
  homelab:
    external: true
