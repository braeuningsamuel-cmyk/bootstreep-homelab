---
# Hermes – Alternative KI-Chat UI

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  networks: [backend]

services:
  hermes:
    <<: *common
    build:
      context: ./hermes
      dockerfile: Dockerfile
    image: hermes:latest
    container_name: hermes
    ports:
      - "3000:3000"
    volumes:
      - ~/hermes:/app
    depends_on:
      ollama: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 60s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "3"}

networks:
  backend:
    external: true
