services:
  hermes:
    image: node:20-alpine
    container_name: hermes
    restart: unless-stopped
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ~/hermes:/app
    command: sh -c "npm install && npm run build && npm start"
    depends_on:
      - ollama
    networks:
      - homelab

networks:
  homelab:
    external: true
