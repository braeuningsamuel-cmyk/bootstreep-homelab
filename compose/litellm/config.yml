---
model_list:
  - model_name: mistral
    litellm_params:
      model: ollama/mistral:7b
      api_base: http://ollama:11434
  - model_name: llama3.2
    litellm_params:
      model: ollama/llama3.2:3b
      api_base: http://ollama:11434
  - model_name: deepseek
    litellm_params:
      model: ollama/deepseek-coder:6.7b
      api_base: http://ollama:11434
  - model_name: phi4
    litellm_params:
      model: ollama/phi4:14b
      api_base: http://ollama:11434

litellm_settings:
  drop_params: true
  set_verbose: false
  # SECURITY: default_key must be set via LITELLM_MASTER_KEY env var, not hardcoded
  # Users should provide a strong API key via environment
  num_retries: 2
  request_timeout: 300
