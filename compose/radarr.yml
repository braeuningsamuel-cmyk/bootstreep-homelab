---
# Radarr – Film-Management

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  networks: [backend]

services:
  radarr:
    <<: *common
    image: lscr.io/linuxserver/radarr:5.10.3
    container_name: radarr
    ports:
      - "7878:7878"
    volumes:
      - radarr_config:/config
      - ~/media/movies:/movies
      - ~/downloads:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-Europe/Berlin}
    deploy:
      resources:
        limits: {memory: 512m, cpus: "1"}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/api/v3/system/status"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  radarr_config:

networks:
  backend:
    external: true
