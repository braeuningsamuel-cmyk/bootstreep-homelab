services:
  unbound:
    image: mvance/unbound:latest
    container_name: unbound
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "127.0.0.1:5335:53/udp"
      - "127.0.0.1:5335:53/tcp"
    volumes:
      - ./unbound.conf:/opt/unbound/unbound.conf:ro
    healthcheck:
      test: ["CMD", "dig", "+short", "google.com", "@127.0.0.1", "-p", "53"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - homelab

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8081:80/tcp"
    environment:
      TZ: ${TIMEZONE:-Europe/Berlin}
      WEBPASSWORD: "${PIHOLE_PASS:-admin}"
      PIHOLE_DNS_: "127.0.0.1#5335"
      DNSSEC: "true"
    volumes:
      - pihole_etc:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    depends_on:
      unbound:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "dig +short google.com @127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    cap_add:
      - NET_ADMIN
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - homelab

volumes:
  pihole_etc:
  pihole_dnsmasq:

networks:
  homelab:
    external: true
