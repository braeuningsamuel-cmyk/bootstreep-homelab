---
# Pi-hole + Unbound (DNS-over-HTTPS)

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  networks: [backend]

services:
  unbound:
    <<: *common
    image: mvance/unbound:latest
    container_name: unbound
    cap_add: [NET_BIND_SERVICE, SETUID, SETGID, CHOWN, NET_RAW, SYS_CHROOT]
    ports:
      - "127.0.0.1:5335:53/udp"
      - "127.0.0.1:5335:53/tcp"
    volumes:
      - ../config/dns/unbound.conf:/opt/unbound/unbound.conf:ro
      - unbound_etc:/opt/unbound/etc
    deploy:
      resources:
        limits: {memory: 128m, cpus: "0.5"}
    healthcheck:
      test: ["CMD-SHELL", "drill -Q google.com @127.0.0.1 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "3"}

  pihole:
    <<: *common
    image: pihole/pihole:2025.03.0
    container_name: pihole
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8081:80/tcp"
      - "8443:443/tcp"
    environment:
      TZ: "${TIMEZONE:-Europe/Berlin}"
      WEBPASSWORD: "${PIHOLE_PASS:?PIHOLE_PASS erforderlich}"
      PIHOLE_DNS_: "127.0.0.1#5335"
      DNSSEC: "true"
      PIHOLE_TELEMETRY: "false"
      PIHOLE_DHCP_ACTIVE: "false"
      PIHOLE_DOMAIN: "lan"
      IPv6: "false"
    volumes:
      - pihole_etc:/etc/pihole
      - pihole_dnsmasq:/etc/dnsmasq.d
    cap_add: [NET_ADMIN]
    depends_on:
      unbound: {condition: service_healthy}
    deploy:
      resources:
        limits: {memory: 256m, cpus: "0.5"}
    healthcheck:
      test: ["CMD", "sh", "-c", "dig +short google.com @127.0.0.1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

volumes:
  pihole_etc:
  pihole_dnsmasq:
  unbound_etc:

networks:
  backend:
    external: true
