---
# Bazarr – Untertitel-Management

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  networks: [backend]

services:
  bazarr:
    <<: *common
    image: lscr.io/linuxserver/bazarr:1.5.1
    container_name: bazarr
    ports:
      - "6767:6767"
    volumes:
      - bazarr_config:/config
      - ~/media/movies:/movies
      - ~/media/series:/tv
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-Europe/Berlin}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  bazarr_config:

networks:
  backend:
    external: true
