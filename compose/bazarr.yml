services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    ports:
      - "6767:6767"
    volumes:
      - bazarr_config:/config
      - ~/media/movies:/movies
      - ~/media/series:/tv
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-Europe/Berlin}
    networks:
      - homelab

volumes:
  bazarr_config:

networks:
  homelab:
    external: true
