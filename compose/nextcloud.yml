---
# Nextcloud AIO – Self-hosted Cloud (Privacy: deine Daten, dein Server)

x-common: &common
  restart: unless-stopped
  security_opt: ["no-new-privileges:true"]
  cap_drop: [ALL]
  networks: [backend]

services:
  nextcloud-aio:
    <<: *common
    cap_drop: []
    image: nextcloud/all-in-one:latest
    container_name: nextcloud-aio
    ports:
      - "8082:8080"
      - "9443:8443"
    volumes:
      - /opt/nextcloud-data:/var/lib/docker/volumes/nextcloud-aio
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 60s
      timeout: 15s
      retries: 5

networks:
  backend:
    external: true
